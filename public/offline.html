<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3d3131" />
    <title>오프라인 | 심심풀이 땅콩</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f1ea;
        --card: #fffaf4;
        --text: #2f2525;
        --muted: #6f5c57;
        --accent: #3d3131;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(61, 49, 49, 0.1), transparent 40%),
          linear-gradient(180deg, var(--bg), #efe4d7);
        color: var(--text);
        font-family: system-ui, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 32px 28px;
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(61, 49, 49, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-block;
        margin-top: 20px;
        color: white;
        background: var(--accent);
        padding: 12px 16px;
        border-radius: 999px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>인터넷 연결이 끊겼어요</h1>
      <p>연결이 돌아오면 게임 화면을 다시 불러올 수 있습니다. 홈으로 이동해서 다시 시도해 주세요.</p>
      <a href="/">홈으로 이동</a>
    </main>
  </body>
</html>
